<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.8.0/mammoth.browser.min.js"></script>
<style>
:root{--navyDeep:#1B2C3D;--navy:#23384C;--navySoft:#36506B;--gold:#E8C887;--goldDeep:#CDA85E;--goldSoft:#F2D299;--paper:#F6F4EF;--card:#fff;--ink:#22272E;--sub:#6B7280;--line:#E7E2D7;--lineSoft:#F0ECE2;--ok:#2E7D32;--okBg:#EAF3EB;--warn:#9A6B12;--warnBg:#FBF3D6;--danger:#B42318;--dangerBg:#FBEAE8;--token:#1F6FEB;--tokenBg:#EAF1FE;}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-size:14px}
.serif{font-family:Georgia,"Times New Roman",serif}
.app{display:flex;min-height:100vh}
.side{width:208px;flex:none;background:var(--navyDeep);display:flex;flex-direction:column;min-height:100vh}
.side .brand{padding:20px 18px}
.side .brand .n{font-family:Georgia,serif;font-size:19px;font-weight:700;color:#fff}
.side .brand .n span{color:var(--gold)}
.side .brand .s{margin-top:2px;font-size:10.5px;text-transform:uppercase;letter-spacing:.18em;color:var(--gold)}
.side nav{padding:6px 12px;display:flex;flex-direction:column;gap:2px}
.side nav a{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:7px;font-size:13px;color:#A9B4C9;text-decoration:none;cursor:pointer}
.side nav a.active{color:#fff;background:var(--navySoft)}
.side nav a svg{width:16px;height:16px}
.side .user{margin-top:auto;padding:18px 16px;border-top:1px solid var(--navySoft);font-size:11px;color:#7E8AA3}
.side .user .av{display:inline-grid;place-items:center;width:28px;height:28px;border-radius:50%;background:var(--gold);color:var(--navy);font-weight:700;font-size:11px;margin-right:8px}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.top{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:13px 24px;background:rgba(246,244,239,.92);backdrop-filter:blur(6px);border-bottom:1px solid var(--line)}
.top .ttl{display:flex;align-items:center;gap:12px}
.refbadge{background:var(--navy);color:var(--gold);font-family:ui-monospace,monospace;font-size:11px;font-weight:700;border-radius:7px;padding:5px 9px}
.subttl{font-family:Georgia,serif;font-size:14px;font-weight:600}
.steps{display:flex;align-items:center;gap:0;padding:12px 24px;flex-wrap:wrap}
.pill{display:flex;align-items:center;gap:7px;border-radius:999px;padding:6px 13px;font-size:12.5px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--sub);cursor:pointer;white-space:nowrap}
.pill.active{background:var(--navy);color:var(--gold);border-color:var(--navy)}
.pill.done{background:var(--okBg);color:var(--ok)}
.pill svg{width:14px;height:14px}
.seg{height:1px;width:18px;background:var(--line)}
.content{padding:8px 24px 40px;max-width:1080px;width:100%}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:16px}
.stitle{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.stitle .ic{display:grid;place-items:center;width:28px;height:28px;border-radius:8px;background:var(--navy)}
.stitle .ic svg{width:15px;height:15px;color:var(--gold)}
.stitle .t{font-family:Georgia,serif;font-size:15px;font-weight:700}
.stitle .sb{font-size:11.5px;color:var(--sub)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.grid .full{grid-column:1/-1}
.ef label{display:block;font-size:11px;color:var(--sub);font-weight:600;margin-bottom:4px}
.efbox{display:flex;align-items:center;gap:8px;border-radius:9px;padding:8px 11px;background:var(--paper);border:1px solid var(--lineSoft)}
.efbox.empty{background:var(--warnBg);border-color:var(--goldDeep)}
.efbox.ro{background:#EFEDE6}
.efbox input,.efbox textarea{flex:1;border:none;background:transparent;font-size:13.5px;font-family:inherit;color:var(--ink);outline:none;resize:vertical}
.efbox.empty input,.efbox.empty textarea{color:var(--warn)}
.efbox .pen{width:13px;height:13px;color:var(--sub);flex:none}
.efbox.mono input{font-family:ui-monospace,monospace}
.cap{font-size:11px;color:var(--sub);margin-top:4px;font-style:italic}
.cap b{color:var(--navy);font-style:normal}
.seg-ctl{display:inline-flex;border-radius:9px;overflow:hidden;border:1px solid var(--line);flex-wrap:wrap}
.seg-ctl button{border:none;padding:8px 13px;font-size:12.5px;font-weight:600;background:#fff;color:var(--sub);cursor:pointer}
.seg-ctl button.on{background:var(--navy);color:var(--gold)}
.row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:11px 0;border-top:1px solid var(--lineSoft)}
.row:first-child{border-top:none}
.row .lbl{font-size:13px}.row .lbl small{display:block;color:var(--sub);font-size:11px}
.btns{display:flex;justify-content:space-between;gap:10px;margin-top:6px}
.b-primary{display:inline-flex;align-items:center;gap:8px;border:none;border-radius:9px;padding:11px 18px;font-size:13px;font-weight:600;background:var(--navy);color:var(--gold);cursor:pointer}
.b-primary:hover{background:#2c465e}.b-primary:disabled{opacity:.5;cursor:not-allowed}
.b-ghost{display:inline-flex;align-items:center;gap:7px;border-radius:9px;padding:11px 15px;font-size:13px;font-weight:600;color:var(--navy);border:1px solid var(--line);background:#fff;cursor:pointer}
.zones{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.zone{border:1.5px dashed var(--goldDeep);border-radius:12px;background:#FCFBF7;padding:18px;text-align:center;cursor:pointer;transition:.15s}
.zone.drag{background:var(--warnBg);border-color:var(--navy)}
.zone svg{width:22px;height:22px;color:var(--goldDeep);margin-bottom:6px}
.zone .zt{font-size:13px;font-weight:600;color:var(--navy)}
.zone .zs{font-size:11px;color:var(--sub);margin-top:3px}
.filelist{margin-top:14px;display:flex;flex-direction:column;gap:7px}
.fileitem{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:9px;padding:8px 11px;background:#fff;font-size:12.5px}
.fileitem svg{width:15px;height:15px;color:var(--navy);flex:none}
.fileitem .tagz{margin-left:auto;font-size:10px;background:var(--tokenBg);color:var(--token);border-radius:999px;padding:2px 8px;font-weight:700}
.fileitem .rm{cursor:pointer;color:var(--sub)}
.chip{font-size:10.5px;border-radius:999px;padding:2px 9px;font-weight:700}
.chip.media{background:var(--warnBg);color:var(--warn)}
.alert{display:flex;gap:9px;align-items:flex-start;border-radius:9px;padding:10px 12px;font-size:12.5px;margin-bottom:8px}
.alert svg{width:15px;height:15px;flex:none;margin-top:1px}
.alert.ok{background:var(--okBg);color:#1f5b22}.alert.warn{background:var(--warnBg);color:var(--warn)}.alert.info{background:var(--tokenBg);color:#15489c}
.paper{background:#FCFBF7;border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 28px rgba(13,27,42,.07);padding:42px 48px;max-width:760px;margin:0 auto}
.paper h1{font-family:Georgia,serif;text-align:center;font-size:16px;margin:0 0 4px;color:var(--navyDeep)}
.paper .rule{height:2px;width:64px;background:var(--gold);margin:8px auto 20px}
.paper p{font-family:Georgia,serif;font-size:12.5px;line-height:1.7;text-align:justify;margin:8px 0}
.paper .ctit{text-align:center;font-weight:bold;margin:16px 0 1px}.paper .csub{text-align:center;font-weight:bold;margin:0 0 5px}
.tk{color:var(--token);background:var(--tokenBg);border-radius:3px;padding:0 3px;font-weight:600}
.tke{color:var(--warn);background:var(--warnBg);border-radius:3px;padding:0 7px;text-decoration:underline;text-decoration-color:var(--goldDeep);font-weight:600}
.mlist{color:var(--sub);font-family:Georgia,serif;font-size:11.5px;line-height:1.85;margin-top:10px;border-top:1px dashed var(--line);padding-top:9px}
.spin{display:inline-block;width:15px;height:15px;border:2px solid var(--gold);border-top-color:transparent;border-radius:50%;animation:sp 0.8s linear infinite;vertical-align:-2px}
@keyframes sp{to{transform:rotate(360deg)}}

.aq input{border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:13px;font-family:inherit}

 ${(typeof alertas!=="undefined"?alertas:[]).filter(a=>a.resposta&&String(a.resposta).trim()).length?'<p class="ctit">DECLARAÇÕES / NOTAS</p>'+(alertas.filter(a=>a.resposta&&String(a.resposta).trim()).map(a=>'<p>• '+esc(a.q)+': '+esc(a.resposta)+'</p>').join('')):''}<div class="mlist">Pré-visualização resumida. O Word gerado inclui as 16 cláusulas (cessão, propriedade horizontal, etc.).</div>`;
 return h("div",{class:"paper",html:html});
}
function renderPaper(){
 const s=state;
 if(s.tipo==="futuro") return renderPaperBF(s);
 const obj=s.objeto_frase?TK(s.objeto_frase)+', ':'';
 const finTxt={credito:'O negócio fica sujeito à condição suspensiva de obtenção de crédito à habitação pela Parte Compradora',avaliacao:'O negócio fica sujeito à condição suspensiva do resultado da avaliação bancária',ambos:'O negócio fica sujeito à condição suspensiva de obtenção de financiamento bancário e do resultado da avaliação bancária'};

 const med=s.tem_mediacao?'O negócio teve a intervenção de mediação da sociedade “'+TK(s.med_nome)+'”, com licença AMI '+TK(s.med_ami)+'.':'O presente negócio não teve a intervenção de mediação imobiliária.';
 const hipp=s.tem_hipoteca?'<p>Sobre o imóvel incide hipoteca voluntária a favor do '+TK(s.im_hip_banco)+', pela apresentação '+TK(s.im_hip_apres)+'.</p>':'';
 const notas=(typeof alertas!=="undefined"?alertas:[]).filter(a=>a.resposta&&String(a.resposta).trim()).map(a=>'<p>• '+esc(a.q)+': '+esc(a.resposta)+'</p>').join('');
 const html=`
 <h1>CONTRATO PROMESSA DE COMPRA E VENDA</h1><div class="rule"></div>
 <p><b>ENTRE:</b></p>
 <p>${partyText("v","Parte Promitente-Vendedora")}</p>
 <p><b>E</b></p>
 <p>${partyText("c","Parte Promitente-Compradora")}</p>
 <p class="ctit">CLÁUSULA PRIMEIRA</p><p class="csub">(Imóvel)</p>
 ${cl1Preview(s)}
 ${hipp}
 <p class="ctit">CLÁUSULA SEGUNDA</p><p class="csub">(Objeto)</p>
 <p>O imóvel é vendido no estado em que se encontra, ${obj}condição essencial da celebração do contrato definitivo.</p>
 <p class="ctit">CLÁUSULA TERCEIRA</p><p class="csub">(Preço)</p>
 <p>1. Preço: ${TK(s.pr_total)}€ (${TK(s.pr_total_ext)}).</p>
 <p>2. Sinal: ${TK(s.pr_sinal)}€ (${TK(s.pr_sinal_ext)}), por transferência da conta IBAN ${TK(s.pr_iban_comp)} (${TK(s.pr_banco_comp)}) para a conta IBAN ${TK(s.pr_iban_dest)}.</p>
 <p>3. Remanescente: ${TK(s.pr_remanescente)}€ (${TK(s.pr_remanescente_ext)}), pago na escritura.</p>
 ${fin}
 <p class="ctit">CLÁUSULA QUARTA</p><p class="csub">(Prazo)</p>
 <p>Escritura no prazo de ${TK(s.pr_prazo_escritura)} dias a contar da assinatura.</p>
 <p class="ctit">MEDIAÇÃO</p><p>${med}</p>
 <p class="ctit">FORO E DATA</p><p>Foro da Comarca de ${TK(s.foro_comarca)}. ${TK(s.data_extenso)}</p>
 ${notas?'<p class="ctit">DECLARAÇÕES / NOTAS</p>'+notas:''}
 <div class="mlist">Pré-visualização resumida. O Word gerado inclui todas as cláusulas da minuta.</div>`;
 return h("div",{class:"paper",html:html});
}
function updatePreviewIfShown(){if(step===5){const c=document.getElementById("content");const old=c.querySelector(".paper");if(old)old.replaceWith(renderPaper());}}
function updateCounts(){const keys=["v_nome","v_nif","v_estado_civil","v_freguesia","v_concelho","v_morada","v_cc","v_cc_validade","c_nome","c_nif","c_estado_civil","c_freguesia","c_concelho","c_morada","c_cc","c_cc_validade","im_letra","im_composicao","im_conservatoria","im_descricao","im_freguesia","im_concelho","im_artigo","im_licenca_num","im_licenca_data","im_cee_num","im_cee_validade","pr_total","pr_sinal","pr_iban_comp","pr_iban_dest","pr_prazo_escritura","foro_comarca","data_extenso"];const f=keys.filter(k=>state[k]&&String(state[k]).trim()).length;const el=document.getElementById("cnt");if(el)el.textContent=f+"/"+keys.length+" campos-chave preenchidos";}

function toB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});}
function toAB(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsArrayBuffer(file);});}
async function docxText(file){const ab=await toAB(file);return (await window.mammoth.extractRawText({arrayBuffer:ab})).value;}
const KEYS=["v_nome","v_nif","v_estado_civil","v_freguesia","v_concelho","v_morada","v_cc","v_cc_validade","v_email","v_telemovel","c_nome","c_nif","c_estado_civil","c_freguesia","c_concelho","c_morada","c_cc","c_cc_validade","c_email","c_telemovel","im_letra","im_composicao","im_sito","im_conservatoria","im_descricao","im_freguesia","im_concelho","im_artigo","im_licenca_num","im_licenca_data","im_cee_num","im_cee_validade","im_hip_banco","im_hip_apres","pr_total","pr_sinal","pr_iban_comp","pr_banco_comp","med_nome","med_ami","foro_comarca"];
async function runExtraction(){
 if(processing)return;if(!files.length){toast("Carrega pelo menos um documento.",true);return;}
 processing=true;renderStep();
 try{
  const content=[];
  for(const f of files){const n=f.name.toLowerCase();
   if(n.endsWith(".pdf"))content.push({type:"document",source:{type:"base64",media_type:"application/pdf",data:await toB64(f.file)}});
   else if(/\.(png|jpe?g|webp|gif)$/.test(n)){const mt=n.endsWith(".png")?"image/png":n.endsWith(".webp")?"image/webp":n.endsWith(".gif")?"image/gif":"image/jpeg";content.push({type:"image",source:{type:"base64",media_type:mt,data:await toB64(f.file)}});}
   else if(n.endsWith(".docx"))content.push({type:"text",text:"=== Word: "+f.name+" ("+f.zone+") ===\n"+(await docxText(f.file)).slice(0,12000)});
   else content.push({type:"text",text:"(Não suportado: "+f.name+")"});
  }
  content.push({type:"text",text:
   "És um assistente jurídico português a preparar um Contrato-Promessa de Compra e Venda (CPCV).\n"+
   "REGRA-CHAVE das partes: o VENDEDOR (v_) é o TITULAR/dono que consta da documentação do imóvel (certidão predial, caderneta). Quem detém os documentos do imóvel é o vendedor. O COMPRADOR (c_) é a outra parte.\n"+
   "Devolve APENAS JSON minificado, sem texto nem marcas de código: {\"tipo\":\"...\",\"dados\":{...},\"alertas\":[...]}.\n"+
   "\"tipo\" = tipo de imóvel/minuta, um de: fracao (fração autónoma em PH), predio (prédio urbano/moradia), rustico (prédio rústico), terreno (terreno para construção), futuro (compra de bem futuro a promotor/na planta). Deduz dos documentos.\n"+
   "\"dados\": usa só estas chaves quando encontrares (omite as restantes): "+KEYS.join(", ")+". Para v_estado_civil/c_estado_civil usa exatamente um de: solteiro(a) maior, casado(a), divorciado(a), viúvo(a).\n"+
   "\"alertas\": 2 a 6 objetos {\"q\":\"pergunta curta\",\"tipo\":\"escolha\"|\"texto\",\"opcoes\":[\"...\"]}. Usa \"escolha\" com opcoes quando faça sentido (ex.: q:'O certificado energético foi entregue?', opcoes:['Sim','Não','A obter']); usa \"texto\" para datas/valores a indicar. Exemplos: validade do CC inferior a 6 meses; hipoteca registada a cancelar; divergência certidão/caderneta; CEE em falta.\n"+
   "Regras: nomes em MAIÚSCULAS; NIF só dígitos; datas dd/mm/aaaa; im_descricao=descrição predial; im_artigo=artigo matricial. Não inventes; em dúvida, omite."});
  const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1500,messages:[{role:"user",content}]})});
  const data=await resp.json();
  if(data.error)throw new Error(data.error.message||"Erro da API");
  let txt=(data.content||[]).map(b=>b.type==="text"?b.text:"").join("").trim().replace(/```json/gi,"").replace(/```/g,"").trim();
  const m=txt.match(/\{[\s\S]*\}/);if(m)txt=m[0];
  const out=JSON.parse(txt);
  const dados=out.dados||{};
  const norm=v=>{v=String(v||"").toLowerCase();if(v.includes("casad"))return "casado(a)";if(v.includes("solteir"))return "solteiro(a) maior";if(v.includes("divor"))return "divorciado(a)";if(v.includes("vi")&&v.includes("v"))return "viúvo(a)";return "";};
  if(dados.v_estado_civil)dados.v_estado_civil=norm(dados.v_estado_civil)||dados.v_estado_civil;
  if(dados.c_estado_civil)dados.c_estado_civil=norm(dados.c_estado_civil)||dados.c_estado_civil;
  let n=0;Object.keys(dados).forEach(k=>{if(k in state&&dados[k]!=null&&String(dados[k]).trim()){state[k]=String(dados[k]);n++;}});
  const TT=["fracao","predio","rustico","terreno","futuro"];
  if(out.tipo&&TT.includes(out.tipo))state.tipo=out.tipo;
  alertas=Array.isArray(out.alertas)?out.alertas.map(a=>typeof a==="string"?{q:a,tipo:"texto",resposta:""}:{q:a.q||"",tipo:(a.tipo==="escolha"?"escolha":"texto"),opcoes:Array.isArray(a.opcoes)?a.opcoes:undefined,resposta:""}):[];
  recompute();extracted=true;processing=false;
  toast(I.check+" IA: tipo «"+(TYPES.find(t=>t.id===state.tipo)||{n:state.tipo}).n+"», "+n+" campo(s), "+alertas.length+" alerta(s).");
  go(2);
 }catch(e){console.error(e);processing=false;renderStep();toast("Não consegui ler automaticamente ("+(e.message||e)+"). Preenche à mão.",true);}
}
function offerDownload(blob,filename){
 try{
  const url=URL.createObjectURL(blob);
  const slot=document.getElementById("dlslot");
  if(slot){slot.innerHTML="";const a=h("a",{href:url,download:filename,class:"b-primary",style:"text-decoration:none;display:inline-flex"},"⬇ Descarregar "+filename);slot.appendChild(a);slot.appendChild(h("span",{class:"cap",style:"margin-left:10px"},"Se o download não começar sozinho, clica no botão acima."));}
  let auto=false;
  try{if(window.saveAs){window.saveAs(blob,filename);auto=true;}}catch(e){}
  if(!auto){const a2=document.createElement("a");a2.href=url;a2.download=filename;document.body.appendChild(a2);try{a2.click();}catch(e){}setTimeout(()=>{try{a2.remove();}catch(e){}},0);}
  return true;
 }catch(e){console.error(e);return false;}
}
function gerarWord(){
 if(!READY[state.tipo]){toast("A minuta «"+(TYPES.find(t=>t.id===state.tipo).n)+"» ainda não está disponível.",true);return;}
 recompute();
 const DT=window.docxtemplater&&(window.docxtemplater.default||window.docxtemplater);
 if(!window.PizZip||!DT){toast("As bibliotecas não carregaram. Abre o ficheiro .html diretamente no browser (Chrome/Edge), fora do chat.",true);return;}
 const b64=TPLS[state.tipo];
 if(!b64){toast("Modelo do tipo «"+state.tipo+"» não encontrado.",true);return;}
 let doc;
 try{
  const zip=new window.PizZip(b64,{base64:true});
  doc=new DT(zip,{paragraphLoop:true,linebreaks:true,nullGetter:()=>""});
  doc.render(state);
 }catch(e){
  console.error(e);let msg=e.message||String(e);
  if(e.properties&&e.properties.errors&&e.properties.errors.length){msg=e.properties.errors.map(x=>(x.properties&&x.properties.explanation)||x.message).join("; ");}
  toast("Erro a compor o documento: "+msg,true);return;
 }
 try{
  const blob=doc.getZip().generate({type:"blob",mimeType:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
  const fn=(state.referencia||"CPCV")+"_"+state.tipo+".docx";
  offerDownload(blob,fn);
  toast(I.check+" Word gerado ("+fn+"). Se não descarregar, usa o botão «Descarregar».");
 }catch(e){console.error(e);toast("Erro ao gerar o ficheiro: "+(e.message||e),true);}
}
document.getElementById("newbtn").addEventListener("click",()=>{toast("Novo processo: limpa os campos (a fazer na versão com base de dados).");});
renderShell();
</script>
